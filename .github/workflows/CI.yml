name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python tooling
        run: python -m pip install --upgrade pip maturin pytest

      - name: Build extension for tests
        run: maturin develop --release --features python

      - name: Run Python smoke test
        run: python -m pytest tests/test_smoke.py -q

      - name: Run Rust tests
        run: cargo test -q
