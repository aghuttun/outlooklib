name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (${{ matrix.os }} - Python 3.11)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      OUTLOOKLIB_CLIENT_ID: ${{ secrets.OUTLOOKLIB_CLIENT_ID }}
      OUTLOOKLIB_TENANT_ID: ${{ secrets.OUTLOOKLIB_TENANT_ID }}
      OUTLOOKLIB_CLIENT_SECRET: ${{ secrets.OUTLOOKLIB_CLIENT_SECRET }}
      OUTLOOKLIB_CLIENT_EMAIL: ${{ secrets.OUTLOOKLIB_CLIENT_EMAIL }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy  # opcional mas útil

      - name: Install dependencies
        run: python -m pip install --upgrade pip maturin pytest

      - name: Install package in development mode
        run: maturin develop --release --features python

      - name: Run Python smoke tests
        run: python -m pytest tests/test_smoke.py -q --tb=no

      - name: Run live Graph tests (only on Ubuntu with secrets)
        if: matrix.os == 'ubuntu-latest' && env.OUTLOOKLIB_CLIENT_ID != ''
        run: python -m pytest tests/test_live_graph.py -q --tb=no

      - name: Run Rust tests
        run: cargo test --quiet

  build:
    name: Build wheels + sdist
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out dist
          sccache: true   # acelera bastante builds

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python + maturin
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
