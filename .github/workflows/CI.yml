name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python tooling
        run: python -m pip install --upgrade pip maturin pytest

      - name: Build extension for tests
        run: maturin develop --release --features python

      - name: Run Python smoke test
        run: python -m pytest tests/test_smoke.py -q

      - name: Run Rust tests
        run: cargo test -q

  build-wheel:
    name: Build Windows wheel
    runs-on: windows-latest
    env:
      OUTLOOKLIB_CLIENT_ID: ${{ secrets.OUTLOOKLIB_CLIENT_ID }}
      OUTLOOKLIB_TENANT_ID: ${{ secrets.OUTLOOKLIB_TENANT_ID }}
      OUTLOOKLIB_CLIENT_SECRET: ${{ secrets.OUTLOOKLIB_CLIENT_SECRET }}
      OUTLOOKLIB_CLIENT_EMAIL: ${{ secrets.OUTLOOKLIB_CLIENT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build extension in-place for tests
        run: maturin develop --release --features python

      - name: Run Python smoke tests
        run: python -m pip install --upgrade pytest; python -m pytest tests/test_smoke.py -q

      - name: Run optional live Graph test
        if: ${{ env.OUTLOOKLIB_CLIENT_ID != '' && env.OUTLOOKLIB_TENANT_ID != '' && env.OUTLOOKLIB_CLIENT_SECRET != '' && env.OUTLOOKLIB_CLIENT_EMAIL != '' }}
        run: python -m pytest tests/test_live_graph.py -q

      - name: Run Rust tests
        run: cargo test -q

      - name: Build wheel
        run: maturin build --release --features python --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: outlooklib-wheel
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: [test, build-wheel]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: outlooklib-wheel
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
