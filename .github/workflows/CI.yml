name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      OUTLOOKLIB_CLIENT_ID: ${{ secrets.OUTLOOKLIB_CLIENT_ID }}
      OUTLOOKLIB_TENANT_ID: ${{ secrets.OUTLOOKLIB_TENANT_ID }}
      OUTLOOKLIB_CLIENT_SECRET: ${{ secrets.OUTLOOKLIB_CLIENT_SECRET }}
      OUTLOOKLIB_CLIENT_EMAIL: ${{ secrets.OUTLOOKLIB_CLIENT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin + pytest
        run: python -m pip install --upgrade pip maturin pytest

      - name: Install package (development mode)
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release --features python
          sccache: true

      - name: Run Python smoke tests
        run: python -m pytest tests/test_smoke.py -q --tb=no

      - name: Run live Graph tests
        if: matrix.os == 'ubuntu-latest' && env.OUTLOOKLIB_CLIENT_ID != ''
        run: python -m pytest tests/test_live_graph.py -q --tb=no

      - name: Run Rust tests
        run: cargo test --quiet

  build:
    name: Build wheels (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out dist
          sccache: true
          manylinux: auto          # importante para Linux

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-sdist]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
