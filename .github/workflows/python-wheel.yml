name: Python Wheel

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-wheel:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build extension in-place for tests
        run: maturin develop --release --features python

      - name: Run Python smoke tests
        run: python -m pip install --upgrade pytest; python -m pytest tests/test_smoke.py -q

      - name: Run optional live Graph test
        if: ${{ secrets.OUTLOOKLIB_CLIENT_ID != '' && secrets.OUTLOOKLIB_TENANT_ID != '' && secrets.OUTLOOKLIB_CLIENT_SECRET != '' && secrets.OUTLOOKLIB_CLIENT_EMAIL != '' }}
        env:
          OUTLOOKLIB_CLIENT_ID: ${{ secrets.OUTLOOKLIB_CLIENT_ID }}
          OUTLOOKLIB_TENANT_ID: ${{ secrets.OUTLOOKLIB_TENANT_ID }}
          OUTLOOKLIB_CLIENT_SECRET: ${{ secrets.OUTLOOKLIB_CLIENT_SECRET }}
          OUTLOOKLIB_CLIENT_EMAIL: ${{ secrets.OUTLOOKLIB_CLIENT_EMAIL }}
        run: python -m pytest tests/test_live_graph.py -q

      - name: Run Rust tests
        run: cargo test -q

      - name: Build wheel
        run: maturin build --release --features python --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: outlooklib-wheel
          path: dist/*.whl

  publish-pypi:
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: outlooklib-wheel
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
